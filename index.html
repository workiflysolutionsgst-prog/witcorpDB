<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witcorp Hub | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .nav-btn.active { background-color: #fbbf24; color: #1e3a8a; font-weight: 800; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .section { display: none; }
        .section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        tr:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-[#1e3a8a] text-white flex flex-col shadow-2xl z-50">
        <div class="p-8 border-b border-white/10 text-center">
            <div class="w-16 h-16 mx-auto mb-4 bg-white rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fas fa-university text-[#1e3a8a] text-2xl"></i>
            </div>
            <h1 class="text-lg font-black text-yellow-400 tracking-tighter uppercase">Witcorp India</h1>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="showSection('dashboard')" class="nav-btn active w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-chart-pie w-5"></i> Dashboard
            </button>
            <div class="pt-4 pb-2 px-4 text-[10px] font-black text-blue-300 uppercase tracking-widest">Managements</div>
            <button onclick="filterRecords('GST')" class="nav-btn w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-receipt w-5"></i> GST Management
            </button>
            <button onclick="filterRecords('ROC')" class="nav-btn w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-building w-5"></i> ROC / MCA
            </button>
            <button onclick="filterRecords('IT')" class="nav-btn w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-coins w-5"></i> Income Tax
            </button>
            <button onclick="filterRecords('PT')" class="nav-btn w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-briefcase w-5"></i> Prof. Tax (PT)
            </button>
        </nav>

        <div class="p-6 bg-black/20 text-center border-t border-white/10">
            <p class="text-[10px] uppercase text-blue-300 mb-1">Lead Developer</p>
            <p class="font-bold text-sm">Kamlesh Yadav</p>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 overflow-y-auto p-8 lg:p-12">
        
        <!-- DASHBOARD SECTION -->
        <div id="dashboard" class="section active">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black text-slate-800">Workspace Overview</h2>
                <div id="syncIndicator" class="flex items-center gap-2 px-4 py-2 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> SYSTEM LIVE
                </div>
            </div>

            <!-- STATS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-l-[12px] border-blue-600">
                    <p class="text-xs font-black text-slate-400 uppercase">Total Portfolios</p>
                    <h3 id="statTotal" class="text-5xl font-black text-slate-800 mt-2">0</h3>
                </div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-l-[12px] border-emerald-500">
                    <p class="text-xs font-black text-slate-400 uppercase">Completed</p>
                    <h3 id="statDone" class="text-5xl font-black text-emerald-600 mt-2">0</h3>
                </div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-l-[12px] border-rose-500">
                    <p class="text-xs font-black text-slate-400 uppercase">Awaiting Action</p>
                    <h3 id="statPending" class="text-5xl font-black text-rose-600 mt-2">0</h3>
                </div>
            </div>

            <!-- ENTRY FORM -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 mb-12">
                <div class="flex items-center gap-3 mb-8">
                    <i class="fas fa-plus-circle text-blue-600 text-xl"></i>
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">New Entry Management</h3>
                </div>
                <input type="hidden" id="editId">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Client Name</label>
                        <input type="text" id="clientName" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Category</label>
                        <select id="serviceCategory" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-bold">
                            <option value="GST">GST Management</option>
                            <option value="ROC">ROC / MCA</option>
                            <option value="IT">Income Tax</option>
                            <option value="PT">Professional Tax</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Service Detail (e.g. GSTR-3B)</label>
                        <input type="text" id="serviceDetail" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Assign Staff</label>
                        <input type="text" id="assignedStaff" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Deadline</label>
                        <input type="date" id="deadline" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Status</label>
                        <select id="status" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-bold">
                            <option value="Pending">Pending</option>
                            <option value="Processing">Processing</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="mt-6 flex gap-4">
                    <button onclick="handleSubmit()" id="submitBtn" class="flex-1 bg-[#1e3a8a] text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-800 transition-all shadow-lg shadow-blue-200">
                        <i class="fas fa-cloud-upload-alt mr-2"></i> Sync To Database
                    </button>
                    <button onclick="clearForm()" class="px-8 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200">Cancel</button>
                </div>
            </div>

            <!-- RECENT TABLE -->
            <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
                <div class="p-8 border-b flex justify-between items-center">
                    <h4 class="font-black text-slate-800 uppercase text-sm">Live Records Database</h4>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Client & Service</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-center">Staff Assigned</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-center">Deadline</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-center">Status</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="mainTableBody" class="divide-y divide-slate-100">
                            <!-- JS Inject -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- FILTERED VIEW (Used for GST, ROC, etc.) -->
        <div id="filterView" class="section">
            <div class="flex items-center gap-4 mb-10">
                <button onclick="showSection('dashboard')" class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm text-slate-400 hover:text-blue-600">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 id="filterTitle" class="text-3xl font-black text-slate-800 uppercase">Category View</h2>
            </div>
            <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border" id="filterTableContainer">
                <!-- Same table structure as above will be rendered here dynamically -->
            </div>
        </div>

    </main>

    <script>
        // --- CREDENTIALS ---
        const SB_URL = 'https://qdkglnkqsoylnquacjyo.supabase.co';
        const SB_KEY = 'sb_publishable_j8DLUkc6Zmjqd5tMvmGJnw_89ppavCX';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let allRecords = [];

        // --- FETCH DATA ---
        async function fetchRecords() {
            const { data, error } = await supabaseClient
                .from('witcorp_records')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Fetch Error:", error);
                return;
            }
            allRecords = data;
            renderMainTable(data);
            updateStats(data);
        }

        // --- RENDER TABLE ---
        function renderMainTable(data, targetId = 'mainTableBody') {
            const tbody = document.getElementById(targetId);
            if (!tbody) return;
            
            tbody.innerHTML = data.length === 0 ? 
                `<tr><td colspan="5" class="p-20 text-center text-slate-400 font-bold">No records found.</td></tr>` : "";

            data.forEach(row => {
                const statusClass = {
                    'Completed': 'bg-emerald-100 text-emerald-700',
                    'Pending': 'bg-rose-100 text-rose-700',
                    'Processing': 'bg-amber-100 text-amber-700'
                }[row.status] || 'bg-slate-100 text-slate-600';

                tbody.innerHTML += `
                    <tr class="group">
                        <td class="p-6">
                            <div class="font-black text-slate-800">${row.client_name}</div>
                            <div class="text-[10px] font-bold text-blue-500 uppercase mt-1">${row.service_category} • ${row.service_detail || 'General'}</div>
                        </td>
                        <td class="p-6 text-center">
                            <div class="inline-flex items-center gap-2 px-3 py-1 bg-slate-100 rounded-lg text-[11px] font-black text-slate-600">
                                <i class="fas fa-user-tie text-[9px]"></i> ${row.assigned_staff || 'Unassigned'}
                            </div>
                        </td>
                        <td class="p-6 text-center font-bold text-slate-500 text-sm">
                            ${row.deadline ? new Date(row.deadline).toLocaleDateString('en-GB') : '---'}
                        </td>
                        <td class="p-6 text-center">
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${statusClass}">
                                ${row.status}
                            </span>
                        </td>
                        <td class="p-6 text-right">
                            <div class="flex justify-end gap-2">
                                <button onclick="editRecord(${row.id})" class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteRecord(${row.id})" class="w-10 h-10 rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white transition-all">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // --- CREATE / UPDATE ---
        async function handleSubmit() {
            const id = document.getElementById('editId').value;
            const payload = {
                client_name: document.getElementById('clientName').value,
                service_category: document.getElementById('serviceCategory').value,
                service_detail: document.getElementById('serviceDetail').value,
                assigned_staff: document.getElementById('assignedStaff').value,
                deadline: document.getElementById('deadline').value,
                status: document.getElementById('status').value
            };

            if (!payload.client_name) return alert("Client Name is required!");

            if (id) {
                // Update
                const { error } = await supabaseClient.from('witcorp_records').update(payload).eq('id', id);
                if (!error) clearForm();
            } else {
                // Insert
                const { error } = await supabaseClient.from('witcorp_records').insert([payload]);
                if (!error) clearForm();
            }
            fetchRecords();
        }

        // --- EDIT ---
        function editRecord(id) {
            const record = allRecords.find(r => r.id === id);
            if (!record) return;

            document.getElementById('editId').value = record.id;
            document.getElementById('clientName').value = record.client_name;
            document.getElementById('serviceCategory').value = record.service_category;
            document.getElementById('serviceDetail').value = record.service_detail;
            document.getElementById('assignedStaff').value = record.assigned_staff;
            document.getElementById('deadline').value = record.deadline;
            document.getElementById('status').value = record.status;

            document.getElementById('submitBtn').innerHTML = `<i class="fas fa-check-circle mr-2"></i> Update Record`;
            document.getElementById('dashboard').scrollIntoView({ behavior: 'smooth' });
        }

        // --- DELETE ---
        async function deleteRecord(id) {
            if (confirm("Permanently delete this record?")) {
                const { error } = await supabaseClient.from('witcorp_records').delete().eq('id', id);
                if (!error) fetchRecords();
            }
        }

        // --- FILTERING ---
        function filterRecords(category) {
            showSection('filterView');
            const titleMap = { 'GST': 'GST Management', 'ROC': 'ROC / MCA Services', 'IT': 'Income Tax (IT)', 'PT': 'Professional Tax (PT)' };
            document.getElementById('filterTitle').innerText = titleMap[category];
            
            const filtered = allRecords.filter(r => r.service_category === category);
            
            // Re-render the table structure inside filter view
            document.getElementById('filterTableContainer').innerHTML = `
                <table class="w-full text-left">
                    <thead class="bg-slate-50"><tr id="filterHeader"></tr></thead>
                    <tbody id="filterTableBody" class="divide-y"></tbody>
                </table>
            `;
            document.getElementById('filterHeader').innerHTML = `
                <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Client</th>
                <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-center">Staff</th>
                <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-center">Deadline</th>
                <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-center">Status</th>
                <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-right">Action</th>
            `;
            renderMainTable(filtered, 'filterTableBody');
        }

        // --- UTILS ---
        function updateStats(data) {
            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statDone').innerText = data.filter(r => r.status === 'Completed').length;
            document.getElementById('statPending').innerText = data.filter(r => r.status === 'Pending').length;
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Highlight nav button
            if (id === 'dashboard') {
                document.querySelector('[onclick*="dashboard"]').classList.add('active');
            }
        }

        function clearForm() {
            document.getElementById('editId').value = "";
            ['clientName', 'serviceDetail', 'assignedStaff', 'deadline'].forEach(i => document.getElementById(i).value = "");
            document.getElementById('submitBtn').innerHTML = `<i class="fas fa-cloud-upload-alt mr-2"></i> Sync To Database`;
        }

        // --- INIT & REALTIME ---
        fetchRecords();
        supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'witcorp_records' }, payload => {
            fetchRecords();
        }).subscribe();

    </script>
</body>
</html>
