<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witcorp Hub | Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .nav-btn.active { background-color: #fbbf24; color: #1e3a8a; font-weight: 800; transform: translateX(5px); }
        .stat-card { cursor: pointer; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        tr:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-[#1e3a8a] text-white flex flex-col shadow-2xl z-50">
        <div class="p-8 border-b border-white/10 text-center">
            <div class="w-14 h-14 mx-auto mb-3 bg-white rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fas fa-university text-[#1e3a8a] text-xl"></i>
            </div>
            <h1 class="text-md font-black text-yellow-400 uppercase tracking-widest">Witcorp India</h1>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="loadCategory('All')" id="btn-all" class="nav-btn active w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-th-large w-5"></i> Dashboard
            </button>
            <div class="pt-4 pb-2 px-4 text-[10px] font-black text-blue-300 uppercase tracking-widest">Services</div>
            <button onclick="loadCategory('GST')" id="btn-gst" class="nav-btn w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-file-invoice-dollar w-5"></i> GST Management
            </button>
            <button onclick="loadCategory('ROC')" id="btn-roc" class="nav-btn w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-building w-5"></i> ROC / MCA
            </button>
            <button onclick="loadCategory('IT')" id="btn-it" class="nav-btn w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-coins w-5"></i> Income Tax (ITR)
            </button>
            <button onclick="loadCategory('PT')" id="btn-pt" class="nav-btn w-full p-4 rounded-xl text-left flex items-center gap-3 transition-all">
                <i class="fas fa-briefcase w-5"></i> Prof. Tax (PT)
            </button>
        </nav>

        <div class="p-4 bg-black/20 text-center text-[11px] font-bold text-blue-200">
            Developer: Kamlesh Yadav
        </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 overflow-y-auto p-6 lg:p-10">
        
        <!-- HEADER & SEARCH -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h2 id="viewTitle" class="text-2xl font-black text-slate-800 uppercase tracking-tight">Main Dashboard</h2>
            <div class="relative w-full md:w-96">
                <input type="text" id="searchInput" onkeyup="searchData()" placeholder="Search client or service..." 
                       class="w-full pl-12 pr-4 py-3 bg-white rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
            </div>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div onclick="filterByStatus('Total')" class="stat-card bg-white p-6 rounded-[2rem] border-b-4 border-blue-600 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase">Total Portfolios</p>
                <h3 id="statTotal" class="text-4xl font-black text-slate-800 mt-1">0</h3>
            </div>
            <div onclick="filterByStatus('Completed')" class="stat-card bg-white p-6 rounded-[2rem] border-b-4 border-emerald-500 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase">Completed</p>
                <h3 id="statDone" class="text-4xl font-black text-emerald-600 mt-1">0</h3>
            </div>
            <div onclick="filterByStatus('Pending')" class="stat-card bg-white p-6 rounded-[2rem] border-b-4 border-rose-500 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase">Awaiting Action</p>
                <h3 id="statPending" class="text-4xl font-black text-rose-600 mt-1">0</h3>
            </div>
        </div>

        <!-- INPUT FORM -->
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 mb-10" id="entryForm">
            <div class="flex items-center gap-3 mb-6">
                <i class="fas fa-edit text-blue-600"></i>
                <h3 id="formModeTitle" class="font-black text-slate-800 uppercase text-sm">Create New Entry</h3>
            </div>
            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-1">
                    <label class="text-[10px] font-black text-slate-400 ml-2">CLIENT NAME</label>
                    <input type="text" id="clientName" class="w-full p-3.5 bg-slate-50 border rounded-xl outline-none focus:border-blue-500 font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 ml-2">CATEGORY</label>
                    <select id="serviceCategory" class="w-full p-3.5 bg-slate-50 border rounded-xl font-bold">
                        <option value="GST">GST Management</option>
                        <option value="ROC">ROC / MCA</option>
                        <option value="IT">Income Tax</option>
                        <option value="PT">Professional Tax</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 ml-2">SERVICE DETAIL</label>
                    <input type="text" id="serviceDetail" class="w-full p-3.5 bg-slate-50 border rounded-xl font-bold" placeholder="e.g. GSTR-1">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 ml-2">ASSIGN STAFF</label>
                    <input type="text" id="assignedStaff" class="w-full p-3.5 bg-slate-50 border rounded-xl font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 ml-2">DEADLINE</label>
                    <input type="date" id="deadline" class="w-full p-3.5 bg-slate-50 border rounded-xl font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 ml-2">STATUS</label>
                    <select id="status" class="w-full p-3.5 bg-slate-50 border rounded-xl font-bold">
                        <option value="Pending">Pending</option>
                        <option value="Processing">Processing</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-slate-400 ml-2">REMARKS</label>
                    <input type="text" id="remarks" class="w-full p-3.5 bg-slate-50 border rounded-xl font-bold" placeholder="Notes for this client...">
                </div>
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="saveData()" id="saveBtn" class="flex-1 bg-[#1e3a8a] text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg shadow-blue-100 hover:bg-blue-800 transition-all">
                    <i class="fas fa-save mr-2"></i> Sync To Supabase
                </button>
                <button onclick="resetForm()" class="px-6 bg-slate-100 text-slate-500 rounded-xl font-bold uppercase text-[10px]">Cancel</button>
            </div>
        </div>

        <!-- RECORDS TABLE -->
        <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border border-slate-100">
            <div class="p-6 border-b bg-slate-50/50 flex justify-between items-center">
                <h4 class="font-black text-slate-700 uppercase text-xs">Recent Records</h4>
                <div id="liveBadge" class="px-3 py-1 bg-emerald-100 text-emerald-600 rounded-full text-[9px] font-black animate-pulse">LIVE CONNECTED</div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                            <th class="p-5">Client Info</th>
                            <th class="p-5">Category</th>
                            <th class="p-5">Assigned Staff</th>
                            <th class="p-5">Deadline</th>
                            <th class="p-5">Status</th>
                            <th class="p-5">Remarks</th>
                            <th class="p-5 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50">
                        <!-- JS loops through data here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://qdkglnkqsoylnquacjyo.supabase.co';
        const SB_KEY = 'sb_publishable_j8DLUkc6Zmjqd5tMvmGJnw_89ppavCX';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let masterData = [];
        let currentFilter = 'All';

        async function fetchAll() {
            const { data, error } = await supabaseClient.from('witcorp_records').select('*').order('created_at', { ascending: false });
            if (!error) {
                masterData = data;
                renderTable(data);
                updateStats(data);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.length === 0 ? '<tr><td colspan="7" class="p-10 text-center text-slate-400 font-bold">No Records Found</td></tr>' : '';

            data.forEach(row => {
                const badge = {
                    'Completed': 'bg-emerald-100 text-emerald-600',
                    'Pending': 'bg-rose-100 text-rose-600',
                    'Processing': 'bg-amber-100 text-amber-600'
                }[row.status] || 'bg-slate-100';

                tbody.innerHTML += `
                    <tr>
                        <td class="p-5">
                            <div class="font-black text-slate-800 text-sm">${row.client_name}</div>
                            <div class="text-[10px] text-slate-400 font-bold">${row.service_detail || '---'}</div>
                        </td>
                        <td class="p-5"><span class="text-[10px] font-black text-blue-600 uppercase px-2 py-1 bg-blue-50 rounded">${row.service_category}</span></td>
                        <td class="p-5 text-xs font-bold text-slate-600 italic">${row.assigned_staff || 'Unassigned'}</td>
                        <td class="p-5 text-xs font-bold text-slate-500">${row.deadline ? new Date(row.deadline).toLocaleDateString('en-GB') : '---'}</td>
                        <td class="p-5"><span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${badge}">${row.status}</span></td>
                        <td class="p-5 text-[11px] text-slate-400 max-w-[150px] truncate">${row.remarks || '---'}</td>
                        <td class="p-5 text-right">
                            <div class="flex justify-end gap-2">
                                <button onclick="editEntry(${row.id})" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-edit text-xs"></i></button>
                                <button onclick="deleteEntry(${row.id})" class="w-8 h-8 rounded-lg bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white transition-all"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // --- CORE FUNCTIONS ---
        async function saveData() {
            const id = document.getElementById('editId').value;
            const payload = {
                client_name: document.getElementById('clientName').value,
                service_category: document.getElementById('serviceCategory').value,
                service_detail: document.getElementById('serviceDetail').value,
                assigned_staff: document.getElementById('assignedStaff').value,
                deadline: document.getElementById('deadline').value,
                status: document.getElementById('status').value,
                remarks: document.getElementById('remarks').value
            };

            if (!payload.client_name) return alert("Client Name missing!");

            const { error } = id ? 
                await supabaseClient.from('witcorp_records').update(payload).eq('id', id) : 
                await supabaseClient.from('witcorp_records').insert([payload]);

            if (!error) {
                resetForm();
                fetchAll();
            }
        }

        function editEntry(id) {
            const item = masterData.find(x => x.id === id);
            if (!item) return;

            // Unlock and Fill ALL Fields
            document.getElementById('editId').value = item.id;
            document.getElementById('clientName').value = item.client_name;
            document.getElementById('serviceCategory').value = item.service_category;
            document.getElementById('serviceDetail').value = item.service_detail;
            document.getElementById('assignedStaff').value = item.assigned_staff;
            document.getElementById('deadline').value = item.deadline;
            document.getElementById('status').value = item.status;
            document.getElementById('remarks').value = item.remarks || '';

            document.getElementById('formModeTitle').innerText = "Updating Entry: " + item.client_name;
            document.getElementById('saveBtn').innerHTML = `<i class="fas fa-check-circle mr-2"></i> Update All Details`;
            
            // Smooth scroll to form
            document.getElementById('entryForm').scrollIntoView({ behavior: 'smooth' });
        }

        async function deleteEntry(id) {
            if (confirm("Delete permanently?")) {
                await supabaseClient.from('witcorp_records').delete().eq('id', id);
                fetchAll();
            }
        }

        // --- NAVIGATION & FILTERS ---
        function loadCategory(cat) {
            currentFilter = cat;
            document.getElementById('viewTitle').innerText = cat === 'All' ? 'Main Dashboard' : cat + ' Management';
            
            // Sidebar UI update
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat.toLowerCase()).classList.add('active');

            const filtered = cat === 'All' ? masterData : masterData.filter(r => r.service_category === cat);
            renderTable(filtered);
        }

        function filterByStatus(status) {
            const filtered = status === 'Total' ? masterData : masterData.filter(r => r.status === status);
            renderTable(filtered);
            document.getElementById('viewTitle').innerText = status + ' Tasks';
        }

        function searchData() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = masterData.filter(r => 
                r.client_name.toLowerCase().includes(q) || 
                r.service_category.toLowerCase().includes(q) ||
                (r.assigned_staff && r.assigned_staff.toLowerCase().includes(q))
            );
            renderTable(filtered);
        }

        function updateStats(data) {
            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statDone').innerText = data.filter(r => r.status === 'Completed').length;
            document.getElementById('statPending').innerText = data.filter(r => r.status === 'Pending').length;
        }

        function resetForm() {
            document.getElementById('editId').value = "";
            ['clientName', 'serviceDetail', 'assignedStaff', 'deadline', 'remarks'].forEach(f => document.getElementById(f).value = "");
            document.getElementById('formModeTitle').innerText = "Create New Entry";
            document.getElementById('saveBtn').innerHTML = `<i class="fas fa-save mr-2"></i> Sync To Supabase`;
        }

        // Run on load
        fetchAll();
        
        // Live update if data changes
        supabaseClient.channel('realtime_records').on('postgres_changes', { event: '*', schema: 'public', table: 'witcorp_records' }, () => {
            fetchAll();
        }).subscribe();

    </script>
</body>
</html>
