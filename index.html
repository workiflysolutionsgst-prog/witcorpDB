<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compliance Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.nav-btn.active{background:#fbbf24;color:#1e3a8a;font-weight:bold;}
.section{display:none;}
.section.active{display:block;}
</style>
</head>

<body class="flex h-screen bg-gray-100">

<!-- SIDEBAR -->
<div class="w-72 bg-blue-900 text-white flex flex-col">

<div class="p-6 text-center border-b">
<h1 class="text-yellow-400 font-bold">WITCORP INDIA</h1>
</div>

<div class="p-4 space-y-2">
<button onclick="showSection('dashboard')" class="nav-btn active w-full p-3 text-left">Dashboard</button>
<button onclick="showSection('gst')" class="nav-btn w-full p-3 text-left">GST</button>
<button onclick="showSection('mca')" class="nav-btn w-full p-3 text-left">MCA</button>
<button onclick="showSection('it')" class="nav-btn w-full p-3 text-left">Income Tax</button>
</div>

</div>

<!-- MAIN -->
<div class="flex-1 p-6 overflow-auto">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

<h2 class="text-2xl font-bold mb-4">Dashboard</h2>

<!-- FORM -->
<div class="bg-white p-4 rounded shadow mb-4 grid grid-cols-3 gap-3">

<input id="clientName" placeholder="Client Name" class="border p-2 rounded">
<input id="serviceType" placeholder="Service (GST/MCA/IT)" class="border p-2 rounded">
<input id="dueDate" type="date" class="border p-2 rounded">

<select id="status" class="border p-2 rounded">
<option>Pending</option>
<option>Completed</option>
</select>

<input id="remarks" placeholder="Remark" class="border p-2 rounded">
<input id="assign" placeholder="Assign" class="border p-2 rounded">

</div>

<button onclick="handleDataSubmit()" class="bg-blue-900 text-white px-5 py-2 rounded">Submit</button>

<!-- TABLE -->
<div class="bg-white mt-4 rounded shadow">
<table class="w-full text-left">
<thead class="bg-gray-200">
<tr>
<th class="p-2">Client</th>
<th class="p-2">Service</th>
<th class="p-2">Date</th>
<th class="p-2">Status</th>
<th class="p-2">Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<!-- GST -->
<div id="gst" class="section">
<h2 class="text-xl font-bold mb-4">GST Data</h2>
<table class="w-full bg-white shadow">
<tbody id="gstBody"></tbody>
</table>
</div>

<!-- MCA -->
<div id="mca" class="section">
<h2 class="text-xl font-bold mb-4">MCA Data</h2>
<table class="w-full bg-white shadow">
<tbody id="mcaBody"></tbody>
</table>
</div>

<!-- IT -->
<div id="it" class="section">
<h2 class="text-xl font-bold mb-4">Income Tax Data</h2>
<table class="w-full bg-white shadow">
<tbody id="itBody"></tbody>
</table>
</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyy_O6WMxf3bBuafqRGMqxoB5c2ougfKKhp_VYjfPQ6y8hiKKZQcCcFvDQ1jXUuMNEkMg/exec";
let dataList=[];

window.onload=loadData;

async function loadData(){
let res=await fetch(scriptURL);
dataList=await res.json();
renderData();
}

function renderData(){

tableBody.innerHTML="";
gstBody.innerHTML="";
mcaBody.innerHTML="";
itBody.innerHTML="";

dataList.forEach(item=>{

let row=`
<tr class="border-b">
<td class="p-2">${item.name}</td>
<td class="p-2">${item.service}</td>
<td class="p-2">${item.date}</td>
<td class="p-2">${item.status}</td>
<td class="p-2"><button onclick="deleteRow('${item.rowId}')">🗑️</button></td>
</tr>`;

tableBody.innerHTML+=row;

// 🔥 FILTER LOGIC (MAIN CHEEZ)
let service=item.service.toLowerCase();

if(service.includes("gst")){
gstBody.innerHTML+=row;
}

else if(service.includes("mca")){
mcaBody.innerHTML+=row;
}

else if(service.includes("it") || service.includes("itr") || service.includes("tax")){
itBody.innerHTML+=row;
}

});

}

async function handleDataSubmit(){

let payload={
action:"add",
name:clientName.value,
service:serviceType.value,
date:dueDate.value,
status:status.value,
remark:remarks.value,
assign:assign.value,
timestamp:new Date().toISOString()
};

await fetch(scriptURL,{method:'POST',body:JSON.stringify(payload)});
loadData();

}

async function deleteRow(id){
await fetch(scriptURL,{method:'POST',body:JSON.stringify({action:'delete',rowId:id})});
loadData();
}

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

</script>

</body>
</html>
