<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witcorp India Advisor LLP | Compliance Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .nav-btn.active { background-color: #fbbf24; color: #1e3a8a; font-weight: bold; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <div class="w-72 bg-[#1e3a8a] text-white flex flex-col shadow-2xl">
        <div class="p-8 pb-3 border-b border-blue-800 flex flex-col items-center text-center">
            <div class="w-20 h-20 mb-3 border-2 border-yellow-400 p-2 rounded-2xl bg-white flex items-center justify-center">
                <i class="fas fa-shield-alt text-blue-900 text-3xl"></i>
            </div>
            <h1 class="text-lg font-bold text-yellow-400 uppercase">Witcorp India <br> Advisor LLP</h1>
        </div>
        <nav class="flex-1 p-6 space-y-2 mt-4">
            <button onclick="showSection('dashboard', this)" class="nav-btn active p-3 rounded-lg text-left w-full flex items-center gap-3"><i class="fas fa-home w-5"></i> Dashboard</button>
            <button onclick="showSection('gst', this)" class="nav-btn p-3 rounded-lg text-left w-full flex items-center gap-3"><i class="fas fa-file-invoice w-5"></i> GST</button>
            <button onclick="showSection('mca', this)" class="nav-btn p-3 rounded-lg text-left w-full flex items-center gap-3"><i class="fas fa-building w-5"></i> MCA</button>
            <button onclick="showSection('it', this)" class="nav-btn p-3 rounded-lg text-left w-full flex items-center gap-3"><i class="fas fa-percentage w-5"></i> Income Tax</button>
        </nav>
        <div class="p-6 text-center text-xs border-t border-blue-800">
            <p class="font-bold text-yellow-400">Developed By Kamlesh Yadav</p>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 p-8 overflow-y-auto">
        <div id="dashboard" class="section active">
            <h2 class="text-3xl font-bold mb-8 text-gray-800 uppercase">Compliance Control Center</h2>
            
            <!-- FORM -->
            <div class="bg-white p-8 rounded-2xl shadow-lg mb-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="editRowId">
                    <input id="clientName" placeholder="Client Name" class="border p-3 rounded-xl outline-none">
                    <input id="serviceType" placeholder="Service (GST, MCA, IT)" class="border p-3 rounded-xl outline-none">
                    <input id="dueDate" type="date" class="border p-3 rounded-xl outline-none">
                    <select id="status" class="border p-3 rounded-xl outline-none">
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <input id="assignTo" placeholder="Assign To (Name)" class="border p-3 rounded-xl outline-none">
                    <input id="remarks" placeholder="Remarks" class="md:col-span-2 border p-3 rounded-xl outline-none">
                    <button onclick="handleDataSubmit()" id="submitBtn" class="bg-[#1e3a8a] text-white rounded-lg font-bold">Update Dashboard</button>
                </div>
            </div>

            <!-- TABLE -->
            <div class="bg-white rounded-2xl shadow-md overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b text-[10px] uppercase">
                        <tr>
                            <th class="p-4">Client</th>
                            <th class="p-4">Service</th>
                            <th class="p-4">Target Date</th>
                            <th class="p-4">Assign To</th>
                            <th class="p-4">Status</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- CATEGORY SECTIONS -->
        <div id="gst" class="section"><h2 class="text-2xl font-bold mb-4">GST Tasks</h2><div id="gstTable"></div></div>
        <div id="mca" class="section"><h2 class="text-2xl font-bold mb-4">MCA Tasks</h2><div id="mcaTable"></div></div>
        <div id="it" class="section"><h2 class="text-2xl font-bold mb-4">Income Tax Tasks</h2><div id="itTable"></div></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzpQh5FhT_V5_d8t8U6iPRj38UFTRa1A9BLq65yEU_iWj6zgytHeMo9tHC_ZrgrI8fgJw/exec';
        let dataList = [];

        async function loadData() {
            const res = await fetch(scriptURL);
            dataList = await res.json();
            refreshUI();
        }

        function refreshUI() {
            const mainTable = document.getElementById('tableBody');
            mainTable.innerHTML = "";
            ['gst', 'mca', 'it'].forEach(id => {
                document.getElementById(id + 'Table').innerHTML = `<table class="w-full bg-white rounded-xl overflow-hidden shadow"><thead class="bg-gray-100 text-[10px] uppercase"><tr><th class="p-4">Client</th><th class="p-4">Assign To</th><th class="p-4">Status</th><th class="p-4">Actions</th></tr></thead><tbody id="${id}Body"></tbody></table>`;
            });

            dataList.reverse().forEach(item => {
                const row = `
                    <td class="p-4 font-bold">${item.name}</td>
                    <td class="p-4 text-blue-700 uppercase text-xs">${item.service}</td>
                    <td class="p-4">${item.date || '-'}</td>
                    <td class="p-4 font-semibold text-purple-700"><i class="fas fa-user-circle mr-1"></i> ${item.assign || 'Not Assigned'}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-full text-[9px] font-bold ${item.status==='Completed'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${item.status}</span></td>
                    <td class="p-4 text-center">
                        <button onclick="startEdit('${item.rowId}')" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow('${item.rowId}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                    </td>`;
                
                mainTable.innerHTML += `<tr class="border-b">${row}</tr>`;
                
                let s = item.service.toLowerCase();
                let catRow = `<td class="p-4 font-bold">${item.name}</td><td class="p-4 font-semibold text-purple-700">${item.assign || '-'}</td><td class="p-4">${item.status}</td><td class="p-4 text-center"><button onclick="startEdit('${item.rowId}')">✏️</button></td>`;
                
                if(s.includes('gst')) document.getElementById('gstBody').innerHTML += `<tr class="border-b">${catRow}</tr>`;
                if(s.includes('mca')) document.getElementById('mcaBody').innerHTML += `<tr class="border-b">${catRow}</tr>`;
                if(s.includes('it') || s.includes('tax')) document.getElementById('itBody').innerHTML += `<tr class="border-b">${catRow}</tr>`;
            });
        }

        async function handleDataSubmit() {
            const rowId = document.getElementById('editRowId').value;
            const payload = {
                action: rowId ? "edit" : "add",
                rowId: rowId || null,
                name: document.getElementById('clientName').value,
                service: document.getElementById('serviceType').value,
                date: document.getElementById('dueDate').value,
                status: document.getElementById('status').value,
                assign: document.getElementById('assignTo').value,
                remark: document.getElementById('remarks').value || "-",
                timestamp: new Date().toLocaleString('en-IN')
            };
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
            location.reload(); 
        }

        function startEdit(id) {
            const item = dataList.find(x => x.rowId == id);
            document.getElementById('clientName').value = item.name;
            document.getElementById('serviceType').value = item.service;
            document.getElementById('dueDate').value = item.date;
            document.getElementById('status').value = item.status;
            document.getElementById('assignTo').value = item.assign || "";
            document.getElementById('remarks').value = item.remark;
            document.getElementById('editRowId').value = id;
            document.getElementById('submitBtn').innerText = "Save Changes";
        }

        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        window.onload = loadData;
    </script>
</body>
</html>
