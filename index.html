<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witcorp Hub | Supabase Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .nav-btn.active { background-color: #fbbf24; color: #1e3a8a; font-weight: 800; transform: scale(1.02); }
        .section { display: none; animation: fadeIn 0.4s ease-in-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .stat-card { transition: all 0.3s ease; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-80 bg-[#1e3a8a] text-white flex flex-col shadow-2xl z-50">
        <div class="p-8 border-b border-blue-800/50 flex flex-col items-center">
            <div class="w-20 h-20 mb-4 border-4 border-yellow-400 rounded-[1.5rem] bg-white flex items-center justify-center">
                <i class="fas fa-landmark text-blue-900 text-3xl"></i>
            </div>
            <h1 class="text-xl font-black text-yellow-400 text-center uppercase">Witcorp India</h1>
        </div>
        
        <nav class="flex-1 p-6 space-y-3">
            <button onclick="showSection('dashboard')" class="nav-btn active p-4 rounded-xl w-full text-left flex items-center gap-3">
                <i class="fas fa-th-large"></i> Dashboard
            </button>
            <button onclick="showSection('management')" class="nav-btn p-4 rounded-xl w-full text-left flex items-center gap-3">
                <i class="fas fa-database"></i> Records
            </button>
        </nav>

        <div class="p-6 bg-blue-900/50 text-center">
            <p class="text-[10px] uppercase tracking-widest text-blue-300">Developer</p>
            <p class="font-bold">Kamlesh Yadav</p>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto bg-slate-50 p-8">
        
        <!-- DASHBOARD -->
        <div id="dashboard" class="section active">
            <header class="mb-10 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 uppercase">Control Center</h2>
                    <p class="text-slate-500 font-medium">WitcorpHub v2 (Powered by Supabase)</p>
                </div>
                <div class="flex items-center gap-3 bg-white p-3 rounded-2xl border">
                    <span id="syncStatus" class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-xs font-black text-slate-600 uppercase">Cloud Live</span>
                </div>
            </header>

            <!-- STATS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="stat-card bg-white p-6 rounded-3xl border-b-8 border-blue-600 shadow-sm">
                    <p class="text-xs font-black text-slate-400 uppercase">Total Portfolios</p>
                    <h3 id="totalCount" class="text-5xl font-black text-slate-800 mt-2">0</h3>
                </div>
                <div class="stat-card bg-white p-6 rounded-3xl border-b-8 border-emerald-500 shadow-sm">
                    <p class="text-xs font-black text-slate-400 uppercase">Completed</p>
                    <h3 id="completedCount" class="text-5xl font-black text-emerald-600 mt-2">0</h3>
                </div>
                <div class="stat-card bg-white p-6 rounded-3xl border-b-8 border-rose-500 shadow-sm">
                    <p class="text-xs font-black text-slate-400 uppercase">Awaiting Action</p>
                    <h3 id="pendingCount" class="text-5xl font-black text-rose-600 mt-2">0</h3>
                </div>
            </div>

            <!-- FORM -->
            <div class="bg-white p-8 rounded-[2rem] shadow-xl mb-10 border border-slate-100">
                <h3 class="text-lg font-black text-slate-800 mb-6 uppercase tracking-tight">Entry Management</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <input type="text" id="clientName" placeholder="Client Name" class="p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-500 font-bold">
                    <input type="text" id="serviceType" placeholder="Service (GST, MCA...)" class="p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-500 font-bold">
                    <input type="date" id="dueDate" class="p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-500 font-bold">
                    <input type="text" id="assignTo" placeholder="Assign Staff" class="p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-500 font-bold">
                    <select id="status" class="p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-500 font-bold">
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <input type="text" id="remarks" placeholder="Remarks" class="p-4 bg-slate-50 border rounded-xl outline-none focus:border-blue-500 font-bold">
                </div>
                <button onclick="saveToSupabase()" class="mt-6 bg-[#1e3a8a] text-white px-10 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-700 transition-all">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> Sync To Supabase
                </button>
            </div>

            <!-- DATA TABLE -->
            <div class="bg-white rounded-[2rem] shadow-sm overflow-hidden border">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-6 text-[10px] font-black uppercase text-slate-400">Client</th>
                            <th class="p-6 text-[10px] font-black uppercase text-slate-400">Service</th>
                            <th class="p-6 text-[10px] font-black uppercase text-slate-400 text-center">Status</th>
                            <th class="p-6 text-[10px] font-black uppercase text-slate-400 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y">
                        <!-- Rows via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- OTHER SECTIONS (PLaceholders) -->
        <div id="management" class="section">
            <h2 class="text-3xl font-black">All Master Records</h2>
            <div id="fullList" class="mt-8"></div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = 'https://qdkglnkqsoylnquacjyo.supabase.co';
        const SB_KEY = 'sb_publishable_j8DLUkc6Zmjqd5tMvmGJnw_89ppavCX';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // --- CORE FUNCTIONS ---
        async function loadData() {
            const { data, error } = await supabase
                .from('witcorp_records')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) console.error(error);
            else renderUI(data);
        }

        async function saveToSupabase() {
            const payload = {
                client_name: document.getElementById('clientName').value,
                service_type: document.getElementById('serviceType').value,
                deadline: document.getElementById('dueDate').value,
                assigned_specialist: document.getElementById('assignTo').value,
                status: document.getElementById('status').value,
                remarks: document.getElementById('remarks').value
            };

            const { error } = await supabase.from('witcorp_records').insert([payload]);
            if (error) alert("Error saving data");
            else {
                clearForm();
                loadData();
            }
        }

        async function deleteRecord(id) {
            if(confirm("Delete this record?")) {
                await supabase.from('witcorp_records').delete().eq('id', id);
                loadData();
            }
        }

        function renderUI(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            // Update Counts
            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('completedCount').innerText = data.filter(x => x.status === 'Completed').length;
            document.getElementById('pendingCount').innerText = data.filter(x => x.status !== 'Completed').length;

            data.forEach(item => {
                const statusColor = item.status === 'Completed' ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50';
                tbody.innerHTML += `
                    <tr>
                        <td class="p-6 font-bold text-slate-800">${item.client_name}</td>
                        <td class="p-6"><span class="text-[10px] font-black bg-blue-50 text-blue-600 p-2 rounded-lg border uppercase">${item.service_type}</span></td>
                        <td class="p-6 text-center"><span class="px-4 py-1 rounded-full font-black text-[10px] uppercase ${statusColor}">${item.status}</span></td>
                        <td class="p-6 text-right">
                            <button onclick="deleteRecord(${item.id})" class="text-slate-300 hover:text-rose-600 transition-colors">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function clearForm() {
            ['clientName', 'serviceType', 'dueDate', 'assignTo', 'remarks'].forEach(id => document.getElementById(id).value = "");
        }

        // Initialize
        loadData();

        // Subscribe to Realtime Changes
        supabase.channel('custom-all-channel')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'witcorp_records' }, () => {
            loadData();
          })
          .subscribe();
    </script>
</body>
</html>
