<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witcorp India | Fast Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .sidebar { background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%); }
        .nav-btn.active { background: rgba(251, 191, 36, 0.1); color: #fbbf24; border-left: 4px solid #fbbf24; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <div class="w-72 sidebar text-white flex flex-col p-6">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg">
                <i class="fas fa-shield-halved text-[#1e3a8a] text-3xl"></i>
            </div>
            <h1 class="font-bold text-lg uppercase tracking-tighter">Witcorp India</h1>
            <p class="text-yellow-400 text-xs font-medium">ADVISOR LLP</p>
        </div>
        
        <nav class="flex-1 space-y-2">
            <button onclick="showSection('dashboard', this)" class="nav-btn active w-full p-4 text-left rounded-xl flex items-center gap-3 transition-all">
                <i class="fas fa-chart-pie"></i> Control Center
            </button>
            <button onclick="showSection('gst', this)" class="nav-btn w-full p-4 text-left rounded-xl flex items-center gap-3 text-slate-400">
                <i class="fas fa-receipt"></i> GST Filings
            </button>
            <button onclick="showSection('mca', this)" class="nav-btn w-full p-4 text-left rounded-xl flex items-center gap-3 text-slate-400">
                <i class="fas fa-landmark"></i> MCA / ROC
            </button>
        </nav>

        <div class="mt-auto p-4 bg-white/5 rounded-2xl text-center">
            <p class="text-[10px] text-slate-400 uppercase">Developed By</p>
            <p class="text-sm font-bold text-yellow-400">Kamlesh Yadav</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 overflow-y-auto p-10">
        <div id="dashboard" class="section active">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-extrabold text-slate-800">Compliance Dashboard</h2>
                <div id="timer" class="bg-white px-4 py-2 rounded-xl shadow-sm font-mono font-bold text-slate-600 italic">00:00:00</div>
            </div>

            <!-- STATS -->
            <div class="grid grid-cols-3 gap-6 mb-10">
                <div class="glass-card p-6 border-t-4 border-blue-500">
                    <p class="text-xs font-bold text-slate-400 uppercase">Total Workload</p>
                    <h3 id="totalCount" class="text-5xl font-black text-slate-800">0</h3>
                </div>
                <div class="glass-card p-6 border-t-4 border-emerald-500">
                    <p class="text-xs font-bold text-slate-400 uppercase">Finalized</p>
                    <h3 id="completedCount" class="text-5xl font-black text-emerald-600">0</h3>
                </div>
                <div class="glass-card p-6 border-t-4 border-rose-500">
                    <p class="text-xs font-bold text-slate-400 uppercase">In Progress</p>
                    <h3 id="pendingCount" class="text-5xl font-black text-rose-600">0</h3>
                </div>
            </div>

            <!-- FORM -->
            <div class="glass-card p-8 mb-10">
                <h4 class="font-bold mb-6 text-slate-700 uppercase tracking-tight flex items-center gap-2">
                    <i class="fas fa-plus-circle text-blue-500"></i> Add New Task
                </h4>
                <div class="grid grid-cols-3 gap-4">
                    <input type="hidden" id="editRowId">
                    <input id="clientName" placeholder="Client Name" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                    <input id="serviceType" placeholder="Service (GST, MCA)" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                    <input id="dueDate" type="date" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                    <select id="status" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none">
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <input id="assignTo" placeholder="Assign To" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                    <input id="remarks" placeholder="Remarks" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                </div>
                <button onclick="handleDataSubmit()" id="submitBtn" class="mt-6 bg-blue-600 text-white px-8 py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all">SYNC TO CLOUD</button>
            </div>

            <!-- TABLE -->
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase">
                        <tr>
                            <th class="p-6">Client Identity</th>
                            <th class="p-6">Service</th>
                            <th class="p-6">Deadline</th>
                            <th class="p-6 text-center">Status</th>
                            <th class="p-6 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <!-- OTHER SECTIONS -->
        <div id="gst" class="section p-4"><h2 class="text-2xl font-bold">GST Filings</h2><div id="gstContent"></div></div>
        <div id="mca" class="section p-4"><h2 class="text-2xl font-bold">MCA Management</h2><div id="mcaContent"></div></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rymnmigplbeotbfnhkxi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_AJlEpmRCyKtAx65lYAY-Tw__jvtRoEF';
        
        // FIX 1: createClient initialization fixed
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dataList = [];

        async function loadData() {
            const { data, error } = await supabaseClient.from('tasks').select('*').order('id', { ascending: false });
            if (!error) {
                dataList = data;
                refreshUI();
            }
        }

        function refreshUI() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            let comp = 0, pend = 0;

            dataList.forEach(item => {
                if(item.status === 'Completed') comp++; else pend++;
                // FIX 2: Correcting property names from DB (due_date)
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="p-6 font-bold">${item.name || 'N/A'}</td>
                        <td class="p-6"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-xs font-bold">${item.service || 'N/A'}</span></td>
                        <td class="p-6 text-sm text-slate-500">${item.due_date || 'N/A'}</td>
                        <td class="p-6 text-center">
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${item.status==='Completed'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">${item.status}</span>
                        </td>
                        <td class="p-6 text-center">
                            <button onclick="startEdit('${item.id}')" class="text-blue-500 mr-3"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteRow('${item.id}')" class="text-rose-500"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('totalCount').innerText = dataList.length;
            document.getElementById('completedCount').innerText = comp;
            document.getElementById('pendingCount').innerText = pend;
        }

        async function handleDataSubmit() {
            const rowId = document.getElementById('editRowId').value;
            // FIX 3: Mapping keys to match image_c90890.png (due_date)
            const payload = {
                name: document.getElementById('clientName').value,
                service: document.getElementById('serviceType').value,
                due_date: document.getElementById('dueDate').value, 
                status: document.getElementById('status').value,
                // Make sure these columns exist in your Supabase table as well
                assign: document.getElementById('assignTo').value,
                remark: document.getElementById('remarks').value
            };

            if (rowId) {
                await supabaseClient.from('tasks').update(payload).eq('id', rowId);
            } else {
                await supabaseClient.from('tasks').insert([payload]);
            }
            
            clearForm();
            loadData();
        }

        async function deleteRow(id) {
            if(confirm("Confirm Delete?")) {
                await supabaseClient.from('tasks').delete().eq('id', id);
                loadData();
            }
        }

        function startEdit(id) {
            const item = dataList.find(x => x.id == id);
            document.getElementById('clientName').value = item.name;
            document.getElementById('serviceType').value = item.service;
            document.getElementById('dueDate').value = item.due_date;
            document.getElementById('status').value = item.status;
            document.getElementById('assignTo').value = item.assign || "";
            document.getElementById('remarks').value = item.remark || "";
            document.getElementById('editRowId').value = item.id;
            document.getElementById('submitBtn').innerText = "UPDATE RECORD";
        }

        function clearForm() {
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.getElementById('status').value = "Pending";
            document.getElementById('submitBtn').innerText = "SYNC TO CLOUD";
            document.getElementById('editRowId').value = "";
        }

        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        setInterval(() => {
            document.getElementById('timer').innerText = new Date().toLocaleTimeString();
        }, 1000);

        window.onload = loadData;
    </script>
</body>
</html>
