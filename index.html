<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Witcorp India Advisor LLP</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
.nav-btn.active { background-color: #fbbf24; color: #1e3a8a; font-weight: bold; }
.section { display:none; }
.section.active { display:block; }
</style>
</head>

<body class="bg-gray-100 flex h-screen">

<!-- SIDEBAR -->
<div class="w-72 bg-[#1e3a8a] text-white flex flex-col">

<div class="p-6 text-center border-b">
<h1 class="text-yellow-400 font-bold">WITCORP INDIA</h1>
</div>

<nav class="p-4 space-y-2">
<button onclick="showSection('dashboard')" class="nav-btn active w-full p-2 text-left">Dashboard</button>
<button onclick="showSection('gst')" class="nav-btn w-full p-2 text-left">GST</button>
<button onclick="showSection('mca')" class="nav-btn w-full p-2 text-left">MCA</button>
<button onclick="showSection('it')" class="nav-btn w-full p-2 text-left">IT</button>
<button onclick="showSection('assign')" class="nav-btn w-full p-2 text-left">Assign</button>
</nav>

<div class="p-4 text-center border-t">
<p>Kamlesh Yadav</p>
</div>

</div>

<!-- MAIN -->
<div class="flex-1 p-6 overflow-auto">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

<input type="hidden" id="editRowId">

<div class="grid grid-cols-3 gap-3 mb-4">
<input id="clientName" placeholder="Client Name" class="p-2 border">
<input id="serviceType" placeholder="Service" class="p-2 border">
<input id="dueDate" type="date" class="p-2 border">
<select id="status" class="p-2 border">
<option>Pending</option>
<option>Completed</option>
</select>
<input id="remarks" placeholder="Remarks" class="p-2 border col-span-2">
</div>

<button onclick="handleDataSubmit()" id="submitBtn" class="bg-blue-900 text-white px-4 py-2">Update</button>
<button onclick="resetForm()" id="cancelBtn" class="hidden bg-gray-400 px-4 py-2">Cancel</button>

<table class="w-full mt-4 bg-white">
<thead>
<tr>
<th>Name</th><th>Service</th><th>Date</th><th>Remark</th><th>Time</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<!-- GST -->
<div id="gst" class="section"><h2>GST</h2><table class="w-full bg-white"><tbody id="gstBody"></tbody></table></div>

<!-- MCA -->
<div id="mca" class="section"><h2>MCA</h2><table class="w-full bg-white"><tbody id="mcaBody"></tbody></table></div>

<!-- IT -->
<div id="it" class="section"><h2>IT</h2><table class="w-full bg-white"><tbody id="itBody"></tbody></table></div>

<!-- ASSIGN -->
<div id="assign" class="section"><h2>Assign Section Ready</h2></div>

</div>

<script>

const scriptURL = "PASTE_YOUR_SCRIPT_URL_HERE";
let dataList = [];

window.onload = loadData;

async function loadData(){
let res = await fetch(scriptURL);
dataList = await res.json();
refreshUI();
}

function formatIST(t){
return new Date(t).toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
}

function refreshUI(){

tableBody.innerHTML="";
gstBody.innerHTML="";
mcaBody.innerHTML="";
itBody.innerHTML="";

dataList.reverse().forEach(item=>{

let date = item.date.includes("T") ? item.date.split("T")[0] : item.date;

let mainRow = `
<tr>
<td>${item.name}</td>
<td>${item.service}</td>
<td>${date}</td>
<td>${item.remark}</td>
<td>${formatIST(item.timestamp)}</td>
<td>${item.status}</td>
<td>
<button onclick="startEdit('${item.rowId}')">✏️</button>
<button onclick="deleteRow('${item.rowId}')">❌</button>
</td>
</tr>`;

tableBody.innerHTML += mainRow;

let subRow = `
<tr>
<td>${item.name}</td>
<td>${date}</td>
<td>${item.remark}</td>
<td>${formatIST(item.timestamp)}</td>
<td>${item.status}</td>
<td>
<button onclick="startEdit('${item.rowId}')">✏️</button>
<button onclick="deleteRow('${item.rowId}')">❌</button>
</td>
</tr>`;

let s = item.service.toLowerCase();

if(s.includes("gst")) gstBody.innerHTML += subRow;
if(s.includes("mca")) mcaBody.innerHTML += subRow;
if(s.includes("it") || s.includes("tax")) itBody.innerHTML += subRow;

});

}

function startEdit(id){

let item = dataList.find(x=>x.rowId==id);

clientName.value = item.name;
serviceType.value = item.service;
dueDate.value = item.date.includes("T") ? item.date.split("T")[0] : item.date;
status.value = item.status;
remarks.value = item.remark;

clientName.disabled=true;
serviceType.disabled=true;
dueDate.disabled=true;
status.disabled=true;

editRowId.value=id;

submitBtn.innerText="Update Remark";
cancelBtn.classList.remove("hidden");

}

function resetForm(){

editRowId.value="";
clientName.value="";
serviceType.value="";
dueDate.value="";
remarks.value="";

clientName.disabled=false;
serviceType.disabled=false;
dueDate.disabled=false;
status.disabled=false;

submitBtn.innerText="Update";
cancelBtn.classList.add("hidden");

}

async function handleDataSubmit(){

let payload={
action: editRowId.value ? "edit" : "add",
rowId: editRowId.value || null,
name: clientName.value,
service: serviceType.value,
date: dueDate.value,
status: status.value,
remark: remarks.value,
timestamp: new Date().toISOString()
};

await fetch(scriptURL,{method:"POST",body:JSON.stringify(payload)});

resetForm();
loadData();

}

async function deleteRow(id){
await fetch(scriptURL,{method:"POST",body:JSON.stringify({action:"delete",rowId:id})});
loadData();
}

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
