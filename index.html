<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witcorp India Advisor LLP | Compliance Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .nav-btn.active { background-color: #fbbf24; color: #1e3a8a; font-weight: bold; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <div class="w-72 bg-[#1e3a8a] text-white flex flex-col shadow-2xl">
        <div class="p-8 pb-3 border-b border-blue-800 flex flex-col items-center text-center">
            <div class="w-20 h-20 mb-3 border-2 border-yellow-400 p-2 rounded-2xl bg-white flex items-center justify-center">
                <i class="fas fa-shield-alt text-blue-900 text-3xl"></i>
            </div>
            <h1 class="text-lg font-bold text-yellow-400 uppercase">Witcorp India <br> Advisor LLP</h1>
        </div>
        <nav class="flex-1 p-6 space-y-2 mt-4">
            <button onclick="showSection('dashboard', this)" class="nav-btn active p-3 rounded-lg text-left w-full flex items-center gap-3"><i class="fas fa-home w-5"></i> Dashboard</button>
            <button onclick="showSection('gst', this)" class="nav-btn p-3 rounded-lg text-left w-full flex items-center gap-3"><i class="fas fa-file-invoice w-5"></i> GST</button>
            <button onclick="showSection('mca', this)" class="nav-btn p-3 rounded-lg text-left w-full flex items-center gap-3"><i class="fas fa-building w-5"></i> MCA</button>
            <button onclick="showSection('it', this)" class="nav-btn p-3 rounded-lg text-left w-full flex items-center gap-3"><i class="fas fa-percentage w-5"></i> Income Tax</button>
        </nav>
        <div class="p-6 text-center text-xs border-t border-blue-800">
            <p class="font-bold text-yellow-400 uppercase">Developed By Kamlesh Yadav</p>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 p-8 overflow-y-auto">
        <div id="dashboard" class="section active">
            <h2 class="text-3xl font-bold mb-8 text-gray-800 uppercase tracking-wide">Compliance Control Center</h2>
            
            <!-- TOP BOXES (THE CARDS YOU WANTED) -->
            <div class="grid grid-cols-4 gap-6 mb-8 text-center">
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-blue-600">
                    <p class="text-gray-400 font-bold uppercase text-xs">All Assignments</p>
                    <p id="totalCount" class="text-4xl font-bold text-blue-900 mt-2">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-green-500">
                    <p class="text-gray-400 font-bold uppercase text-xs">Completed</p>
                    <p id="completedCount" class="text-4xl font-bold text-green-600 mt-2">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-red-500">
                    <p class="text-gray-400 font-bold uppercase text-xs">Pending</p>
                    <p id="pendingCount" class="text-4xl font-bold text-red-600 mt-2">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500">
                    <p class="text-gray-400 font-bold uppercase text-xs">Firm Status</p>
                    <p class="text-2xl font-bold text-yellow-500 mt-2">ACTIVE</p>
                </div>
            </div>

            <!-- FORM -->
            <div class="bg-white p-8 rounded-2xl shadow-lg mb-8 border border-gray-100">
                <h3 id="formHeader" class="font-bold mb-6 text-xl text-blue-900 border-l-4 border-blue-900 pl-3 uppercase">Enter Work Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <input type="hidden" id="editRowId">
                    <input id="clientName" placeholder="Client Name" class="border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                    <input id="serviceType" placeholder="Service (GST, MCA, IT)" class="border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                    <input id="dueDate" type="date" class="border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                    <select id="status" class="border-2 p-3 rounded-xl outline-none bg-white">
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <input id="assignTo" placeholder="Assign To (Name)" class="border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                    <input id="remarks" placeholder="Remarks/Notes" class="md:col-span-1 border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                </div>
                <div class="mt-6">
                    <button onclick="handleDataSubmit()" id="submitBtn" class="bg-[#1e3a8a] text-white px-8 py-3 rounded-lg font-bold shadow-md hover:bg-blue-700 transition uppercase">Update Dashboard</button>
                </div>
            </div>

            <!-- MAIN TABLE -->
            <div class="bg-white rounded-2xl shadow-md overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b text-gray-600 uppercase text-[10px]">
                        <tr>
                            <th class="p-4">Client Name</th>
                            <th class="p-4">Service</th>
                            <th class="p-4">Target Date</th>
                            <th class="p-4">Assign To</th>
                            <th class="p-4 text-center">Status</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- CATEGORY SECTIONS -->
        <div id="gst" class="section"><h2 class="text-3xl font-bold mb-6 border-l-8 border-yellow-500 pl-4 uppercase">GST Management</h2><div id="gstTable"></div></div>
        <div id="mca" class="section"><h2 class="text-3xl font-bold mb-6 border-l-8 border-blue-900 pl-4 uppercase">MCA Compliance</h2><div id="mcaTable"></div></div>
        <div id="it" class="section"><h2 class="text-3xl font-bold mb-6 border-l-8 border-green-600 pl-4 uppercase">Income Tax</h2><div id="itTable"></div></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwvazAY3u-HOy3PjtB-4zi7qPhbKEjOUg2J5G2WO-OHZQ58qaMZsKX39bg5FyOR7_6BVg/exec';
        let dataList = [];

        async function loadData() {
            try {
                const res = await fetch(scriptURL);
                dataList = await res.json();
                refreshUI();
            } catch (e) { console.error("Load failed"); }
        }

        function refreshUI() {
            const mainTable = document.getElementById('tableBody');
            mainTable.innerHTML = "";
            
            const cats = ['gst', 'mca', 'it'];
            cats.forEach(c => {
                document.getElementById(c + 'Table').innerHTML = `<div class="bg-white rounded-2xl shadow-md overflow-hidden"><table class="w-full text-left"><thead class="bg-gray-50 border-b text-[10px] uppercase text-gray-600"><tr><th class="p-4">Client</th><th class="p-4">Assign To</th><th class="p-4 text-center">Status</th><th class="p-4 text-center">Actions</th></tr></thead><tbody id="${c}Body"></tbody></table></div>`;
            });

            let comp = 0, pend = 0;

            [...dataList].reverse().forEach(item => {
                if(item.status === 'Completed') comp++; else pend++;

                let cleanDate = item.date;
                if(cleanDate && cleanDate.includes('T')) cleanDate = new Date(cleanDate).toLocaleDateString('en-GB');

                const rowContent = `
                    <td class="p-4 font-semibold">${item.name}</td>
                    <td class="p-4 text-blue-700 font-bold uppercase text-xs">${item.service}</td>
                    <td class="p-4 text-xs">${cleanDate || '-'}</td>
                    <td class="p-4 font-bold text-purple-700"><i class="fas fa-user-tie mr-1 text-gray-400"></i> ${item.assign || 'None'}</td>
                    <td class="p-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[9px] font-bold uppercase ${item.status==='Completed'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${item.status}</span>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="startEdit('${item.rowId}')" class="text-blue-500 mx-1"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow('${item.rowId}')" class="text-red-400 mx-1"><i class="fas fa-trash-alt"></i></button>
                    </td>`;

                mainTable.innerHTML += `<tr class="border-b hover:bg-blue-50">${rowContent}</tr>`;

                let s = item.service.toLowerCase();
                let catRow = `<td class="p-4 font-bold">${item.name}</td><td class="p-4 text-purple-700 font-bold">${item.assign || '-'}</td><td class="p-4 text-center">${item.status}</td><td class="p-4 text-center"><button onclick="startEdit('${item.rowId}')">✏️</button></td>`;
                
                if(s.includes('gst')) document.getElementById('gstBody').innerHTML += `<tr class="border-b">${catRow}</tr>`;
                if(s.includes('mca')) document.getElementById('mcaBody').innerHTML += `<tr class="border-b">${catRow}</tr>`;
                if(s.includes('it') || s.includes('tax')) document.getElementById('itBody').innerHTML += `<tr class="border-b">${catRow}</tr>`;
            });

            document.getElementById('totalCount').innerText = dataList.length;
            document.getElementById('completedCount').innerText = comp;
            document.getElementById('pendingCount').innerText = pend;
        }

        async function handleDataSubmit() {
            const rowId = document.getElementById('editRowId').value;
            const btn = document.getElementById('submitBtn');
            const payload = {
                action: rowId ? "edit" : "add",
                rowId: rowId || null,
                name: document.getElementById('clientName').value,
                service: document.getElementById('serviceType').value,
                date: document.getElementById('dueDate').value,
                status: document.getElementById('status').value,
                assign: document.getElementById('assignTo').value,
                remark: document.getElementById('remarks').value || "-",
                timestamp: new Date().toLocaleString('en-IN')
            };

            if(!payload.name) return alert("Client Name dalo!");

            btn.disabled = true; btn.innerText = "Syncing...";
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
            resetForm();
            await loadData();
            btn.disabled = false; btn.innerText = "Update Dashboard";
        }

        async function deleteRow(id) {
            if(confirm("Confirm Delete?")) {
                await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: "delete", rowId: id }) });
                await loadData();
            }
        }

        function startEdit(id) {
            const item = dataList.find(x => x.rowId == id);
            document.getElementById('clientName').value = item.name;
            document.getElementById('serviceType').value = item.service;
            document.getElementById('dueDate').value = item.date ? item.date.split('T')[0] : "";
            document.getElementById('status').value = item.status;
            document.getElementById('assignTo').value = item.assign || "";
            document.getElementById('remarks').value = item.remark;
            document.getElementById('editRowId').value = id;
            document.getElementById('submitBtn').innerText = "Save Changes";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('editRowId').value = "";
            document.getElementById('clientName').value = "";
            document.getElementById('serviceType').value = "";
            document.getElementById('dueDate').value = "";
            document.getElementById('remarks').value = "";
            document.getElementById('assignTo').value = "";
            document.getElementById('submitBtn').innerText = "Update Dashboard";
        }

        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        window.onload = loadData;
    </script>
</body>
</html>
