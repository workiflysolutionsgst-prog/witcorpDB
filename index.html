<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witcorp India | Management Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .nav-btn.active { background-color: #fbbf24; color: #1e3a8a; font-weight: bold; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <div class="w-72 bg-[#1e3a8a] text-white flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-blue-800">
            <div class="w-20 h-20 mx-auto mb-4 bg-white rounded-xl flex items-center justify-center border-2 border-yellow-400 shadow-lg">
                <span class="text-blue-900 font-black text-xs uppercase">Witcorp</span>
            </div>
            <h1 class="text-lg font-bold text-yellow-400 leading-tight">WITCORP INDIA <br> ADVISOR LLP</h1>
        </div>
        <nav class="flex-1 p-6 space-y-2 mt-4">
            <button onclick="showSection('dashboard')" class="nav-btn active p-3 rounded-lg w-full text-left flex items-center gap-3"><i class="fas fa-chart-line"></i> Dashboard</button>
            <button onclick="showSection('gst')" class="nav-btn p-3 rounded-lg w-full text-left flex items-center gap-3"><i class="fas fa-file-invoice"></i> GST Management</button>
            <button onclick="showSection('mca')" class="nav-btn p-3 rounded-lg w-full text-left flex items-center gap-3"><i class="fas fa-building"></i> MCA Compliance</button>
            <button onclick="showSection('it')" class="nav-btn p-3 rounded-lg w-full text-left flex items-center gap-3"><i class="fas fa-percentage"></i> Income Tax</button>
        </nav>
        <div class="p-6 text-center border-t border-blue-800">
            <p class="text-[10px] text-yellow-400 font-bold uppercase mb-1">Developed By</p>
            <p class="text-sm font-bold">Genius Kamlesh Yadav</p>
        </div>
    </div>

    <div class="flex-1 p-8 overflow-y-auto">
        
        <div id="dashboard" class="section active">
            <h2 class="text-2xl font-black mb-8 text-gray-800 uppercase tracking-widest">Compliance Control Center</h2>
            
            <div class="grid grid-cols-4 gap-6 mb-8 text-center">
                <div class="bg-white p-6 rounded-xl shadow border-b-4 border-blue-600">
                    <p class="text-xs text-gray-400 font-bold">TOTAL</p>
                    <p id="totalCount" class="text-3xl font-black text-blue-900">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow border-b-4 border-green-500">
                    <p class="text-xs text-gray-400 font-bold">COMPLETED</p>
                    <p id="compCount" class="text-3xl font-black text-green-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow border-b-4 border-red-500">
                    <p class="text-xs text-gray-400 font-bold">PENDING</p>
                    <p id="pendCount" class="text-3xl font-black text-red-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow border-b-4 border-yellow-500">
                    <p class="text-xs text-gray-400 font-bold">FIRM STATUS</p>
                    <p class="text-xl font-bold text-yellow-500 mt-1">ACTIVE</p>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-xl mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <input id="cName" type="text" placeholder="Client Name" class="border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                    <input id="sType" type="text" placeholder="Service (GST, MCA, IT)" class="border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                    <input id="dDate" type="date" class="border-2 p-3 rounded-xl outline-none focus:border-blue-500">
                    <select id="stat" class="border-2 p-3 rounded-xl bg-white outline-none">
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <input id="rem" type="text" placeholder="Remarks/Notes" class="md:col-span-2 border-2 p-3 rounded-xl outline-none">
                </div>
                <button onclick="saveData()" id="subBtn" class="mt-6 bg-[#1e3a8a] text-white px-10 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Update Dashboard</button>
            </div>

            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 border-b uppercase text-[10px] text-gray-500">
                        <tr>
                            <th class="p-4">Client</th><th class="p-4">Service</th><th class="p-4">Target Date</th>
                            <th class="p-4">Track Update</th><th class="p-4 text-center">Status</th><th class="p-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="mainTable"></tbody>
                </table>
            </div>
        </div>

        <div id="gst" class="section"><h2 class="text-2xl font-bold mb-6">GST Records</h2><div class="bg-white rounded-xl shadow overflow-hidden"><table class="w-full text-left"><tbody id="gstList"></tbody></table></div></div>
        <div id="mca" class="section"><h2 class="text-2xl font-bold mb-6">MCA Records</h2><div class="bg-white rounded-xl shadow overflow-hidden"><table class="w-full text-left"><tbody id="mcaList"></tbody></table></div></div>
        <div id="it" class="section"><h2 class="text-2xl font-bold mb-6">Income Tax Records</h2><div class="bg-white rounded-xl shadow overflow-hidden"><table class="w-full text-left"><tbody id="itList"></tbody></table></div></div>
    </div>

    <script>
        // PASTE YOUR NEW DEPLOYMENT URL HERE
        const api = 'https://script.google.com/macros/s/AKfycbyWGa_QnMuubaaXNxzSq0eaToqJ2hsqRuoVL23V-hUOGDaDUfny-52jm07eEdsFl2ghVg/exec';
        let db = [];

        window.onload = fetchDb;

        async function fetchDb() {
            try {
                const res = await fetch(api);
                db = await res.json();
                render();
            } catch(e) { console.error("Load failed"); }
        }

        function calculateDays(ts) {
            const entryDate = new Date(ts);
            const today = new Date();
            const diffTime = Math.abs(today - entryDate);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            return diffDays === 0 ? "Today" : diffDays + " days ago";
        }

        function render() {
            const main = document.getElementById('mainTable');
            const gst = document.getElementById('gstList');
            const mca = document.getElementById('mcaList');
            const it = document.getElementById('itList');

            main.innerHTML = ""; gst.innerHTML = ""; mca.innerHTML = ""; it.innerHTML = "";
            let c=0, p=0;

            [...db].reverse().forEach(item => {
                if(item.status === 'Completed') c++; else p++;
                const dateString = item.date ? new Date(item.date).toLocaleDateString('en-GB') : '-';
                
                const row = `
                <tr class="border-b hover:bg-blue-50 transition">
                    <td class="p-4 font-bold text-gray-800">${item.name}</td>
                    <td class="p-4 text-blue-600 font-bold">${item.service.toUpperCase()}</td>
                    <td class="p-4">${dateString}</td>
                    <td class="p-4 text-[10px] text-gray-400">
                        ${item.timestamp}<br>
                        <b class="text-blue-500">${calculateDays(item.timestamp)}</b>
                    </td>
                    <td class="p-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold ${item.status==='Completed'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${item.status}</span>
                    </td>
                    <td class="p-4">
                        <button onclick="del(${item.rowId})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
                
                main.innerHTML += row;
                
                // Add to filtered pages
                let srv = item.service.toLowerCase();
                if(srv.includes('gst')) gst.innerHTML += row;
                if(srv.includes('mca')) mca.innerHTML += row;
                if(srv.includes('it')) it.innerHTML += row;
            });

            document.getElementById('totalCount').innerText = db.length;
            document.getElementById('compCount').innerText = c;
            document.getElementById('pendCount').innerText = p;
        }

        async function saveData() {
            const btn = document.getElementById('subBtn');
            const data = {
                action: "add",
                name: document.getElementById('cName').value,
                service: document.getElementById('sType').value,
                date: document.getElementById('dDate').value,
                status: document.getElementById('stat').value,
                remark: document.getElementById('rem').value || "-",
                timestamp: new Date().toLocaleString('en-IN')
            };
            if(!data.name || !data.service) return alert("Please fill Name and Service!");
            btn.disabled = true; btn.innerText = "Processing...";
            await fetch(api, { method: 'POST', body: JSON.stringify(data) });
            location.reload();
        }

        async function del(id) {
            if(confirm("Are you sure you want to delete this record?")) {
                await fetch(api, { method: 'POST', body: JSON.stringify({action: "delete", rowId: id}) });
                location.reload();
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
