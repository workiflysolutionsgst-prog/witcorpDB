<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witcorp India | Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .nav-btn.active { background-color: #fbbf24; color: #1e3a8a; font-weight: bold; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <div class="w-72 bg-[#1e3a8a] text-white flex flex-col shadow-2xl">
        <div class="p-8 border-b border-blue-800 text-center">
            <h1 class="text-xl font-bold text-yellow-400 uppercase">Witcorp India</h1>
            <p class="text-[10px] text-blue-200">Developed by Genius Kamlesh</p>
        </div>
        <nav class="flex-1 p-6 space-y-2 mt-4">
            <button onclick="showSection('dashboard')" class="nav-btn active p-3 rounded-lg w-full text-left flex items-center gap-3"><i class="fas fa-home"></i> Dashboard</button>
            <button onclick="showSection('gst')" class="nav-btn p-3 rounded-lg w-full text-left flex items-center gap-3"><i class="fas fa-file-invoice"></i> GST</button>
            <button onclick="showSection('mca')" class="nav-btn p-3 rounded-lg w-full text-left flex items-center gap-3"><i class="fas fa-building"></i> MCA</button>
            <button onclick="showSection('it')" class="nav-btn p-3 rounded-lg w-full text-left flex items-center gap-3"><i class="fas fa-percentage"></i> Income Tax</button>
        </nav>
    </div>

    <div class="flex-1 p-8 overflow-y-auto">
        <div id="dashboard" class="section active">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">COMPLIANCE CONTROL CENTER</h2>
            
            <div class="bg-white p-6 rounded-xl shadow-lg mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input id="clientName" type="text" placeholder="Client Name" class="border p-2 rounded">
                    <input id="serviceType" type="text" placeholder="Service (GST/MCA/ITR)" class="border p-2 rounded">
                    <input id="dueDate" type="date" class="border p-2 rounded">
                    <select id="status" class="border p-2 rounded">
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <input id="remarks" type="text" placeholder="Remarks" class="md:col-span-2 border p-2 rounded">
                </div>
                <button onclick="handleDataSubmit()" id="submitBtn" class="mt-4 bg-blue-900 text-white px-6 py-2 rounded font-bold">Update Dashboard</button>
            </div>

            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-100 uppercase text-[10px] font-bold">
                        <tr><th class="p-4">Client</th><th class="p-4">Service</th><th class="p-4">Target Date</th><th class="p-4">Track</th><th class="p-4 text-center">Actions</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="gst" class="section"><h2 class="text-2xl font-bold mb-6">GST Records</h2><div id="gstTable"></div></div>
        <div id="mca" class="section"><h2 class="text-2xl font-bold mb-6">MCA Records</h2><div id="mcaTable"></div></div>
        <div id="it" class="section"><h2 class="text-2xl font-bold mb-6">Income Tax Records</h2><div id="itTable"></div></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzZ6v2jozpzPp4moINOxwvPJ0OCjBP8WhhQK3z1ZaX4pEop_393vKZpun5ZO7A-EKkmsQ/exec';
        let dataList = [];

        async function loadData() {
            const res = await fetch(scriptURL);
            dataList = await res.json();
            renderTables();
        }

        function timeAgo(dateParam) {
            const date = new Date(dateParam);
            const now = new Date();
            const diff = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            return diff === 0 ? "Today" : diff + " days ago";
        }

        function renderTables() {
            const bodies = {
                main: document.getElementById('tableBody'),
                gst: document.getElementById('gstTable'),
                mca: document.getElementById('mcaTable'),
                it: document.getElementById('itTable')
            };
            Object.values(bodies).forEach(b => b.innerHTML = "");

            dataList.reverse().forEach(item => {
                const row = `<tr class="border-b">
                    <td class="p-4 font-bold">${item.name}</td>
                    <td class="p-4 text-blue-600">${item.service}</td>
                    <td class="p-4">${new Date(item.date).toLocaleDateString('en-GB')}</td>
                    <td class="p-4 text-[10px] text-gray-400">${item.timestamp}<br><b>${timeAgo(item.timestamp)}</b></td>
                    <td class="p-4 text-center space-x-2">
                        <button onclick="deleteItem(${item.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
                bodies.main.innerHTML += row;
                if(item.service.toLowerCase().includes('gst')) bodies.gst.innerHTML += row;
                if(item.service.toLowerCase().includes('mca')) bodies.mca.innerHTML += row;
                if(item.service.toLowerCase().includes('it')) bodies.it.innerHTML += row;
            });
        }

        async function handleDataSubmit() {
            const record = {
                name: document.getElementById('clientName').value,
                service: document.getElementById('serviceType').value,
                date: document.getElementById('dueDate').value,
                status: document.getElementById('status').value,
                remark: document.getElementById('remarks').value,
                timestamp: new Date().toLocaleString('en-IN')
            };
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(record) });
            location.reload();
        }

        async function deleteItem(id) {
            if(confirm("Delete entry?")) {
                await fetch(scriptURL, { method: 'POST', body: JSON.stringify({action: "delete", id: id}) });
                location.reload();
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        window.onload = loadData;
    </script>
</body>
</html>
